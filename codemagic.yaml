workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.peptidai.app
      vars:
        BUNDLE_ID: "com.peptidai.app"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Add iOS platform
        script: |
          npx cap add ios
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Check iOS structure
        script: |
          echo "=== iOS directory ==="
          ls -la ios/App/
          echo "=== Looking for workspace ==="
          find ios -name "*.xcworkspace" -o -name "*.xcodeproj" | head -10
          echo "=== Podfile check ==="
          cat ios/App/Podfile 2>/dev/null || echo "No Podfile"
      - name: Set bundle ID
        script: |
          cd ios/App
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = com.peptidai.app;/g" App.xcodeproj/project.pbxproj
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          cd ios/App
          if [ -d "App.xcworkspace" ]; then
            echo "Using xcworkspace"
            xcodebuild -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -archivePath build/App.xcarchive \
              archive
          else
            echo "Using xcodeproj"
            xcodebuild -project App.xcodeproj \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -archivePath build/App.xcarchive \
              archive
          fi
      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --archive-path ios/App/build/App.xcarchive \
            || xcode-project build-ipa \
              --project ios/App/App.xcodeproj \
              --scheme App \
              --archive-path ios/App/build/App.xcarchive
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
