workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.peptidai.app
      vars:
        BUNDLE_ID: "com.peptidai.app"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Add iOS platform
        script: |
          npx cap add ios
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Generate App Icons
        script: |
          npx @capacitor/assets generate --iconBackgroundColor '#FDF1F4' --iconBackgroundColorDark '#FDF1F4' --splashBackgroundColor '#FDF1F4' --splashBackgroundColorDark '#FDF1F4'
      - name: Check iOS structure
        script: |
          echo "=== iOS directory ==="
          ls -la ios/App/
          echo "=== Looking for workspace ==="
          find ios -name "*.xcworkspace" -o -name "*.xcodeproj" | head -10
          echo "=== Podfile check ==="
          cat ios/App/Podfile 2>/dev/null || echo "No Podfile"
      - name: Configure Xcode Project
        script: |
          cd ios/App
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = com.peptidai.app;/g" App.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = 1;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" App.xcodeproj/project.pbxproj
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          cd ios/App
          if [ -d "App.xcworkspace" ]; then
            echo "Using xcworkspace"
            xcodebuild -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -archivePath build/App.xcarchive \
              archive
          else
            echo "Using xcodeproj"
            xcodebuild -project App.xcodeproj \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -archivePath build/App.xcarchive \
              archive
          fi
      - name: Export IPA
        script: |
          cat > /tmp/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.peptidai.app</key>
                  <string>PeptidAI App Store</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          PLISTEOF
          
          echo "=== ExportOptions.plist ==="
          cat /tmp/ExportOptions.plist
          echo "=== Installed profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null
          
          xcodebuild -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath ios/App/build/ipa
    artifacts:
      - ios/App/build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
