name: OTA Live Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Capgo channel to publish to
        required: true
        default: production
        type: choice
        options:
          - beta
          - production
      bundle_version:
        description: Optional unique bundle version. Leave blank to use package version + run number + SHA.
        required: false
        type: string

concurrency:
  group: peptidai-ota-${{ github.event.inputs.channel }}
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
      CAPGO_APP_ID: com.peptidai.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Upload OTA bundle to Capgo
        run: |
          if [ -z "$CAPGO_TOKEN" ]; then
            echo "CAPGO_TOKEN GitHub secret is missing."
            exit 1
          fi

          CHANNEL="${{ github.event.inputs.channel }}"
          BUNDLE_VERSION="${{ github.event.inputs.bundle_version }}"
          if [ -z "$BUNDLE_VERSION" ]; then
            PACKAGE_VERSION="$(node -p "require('./package.json').version")"
            BUNDLE_VERSION="${PACKAGE_VERSION}-ota.${GITHUB_RUN_NUMBER}.${GITHUB_SHA::7}"
          fi

          npx @capgo/cli@latest bundle upload "$CAPGO_APP_ID" \
            --path dist \
            --channel "$CHANNEL" \
            --bundle "$BUNDLE_VERSION" \
            --comment "$GITHUB_SHA" \
            --apikey "$CAPGO_TOKEN"
